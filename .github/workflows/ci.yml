name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs for the same ref (e.g. rapid PR pushes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

jobs:
  backend:
    name: Backend (Kotlin) — build & test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: apps/api-kt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Build & test
        run: |
          chmod +x ./gradlew
          ./gradlew build --no-daemon

  frontend:
    name: Frontend (React) — build & test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Audit shipped dependencies (blocking)
        # Fail the build on a high/critical vuln in a dependency that ships to
        # users. Dev/build tooling (test runner, bundler) is audited below but
        # kept non-blocking so a transitive dev-only advisory can't derail
        # unrelated PRs.
        run: npm audit --omit=dev --audit-level=high
      - name: Audit all dependencies (informational)
        run: npm audit || true
      - name: Build (type-check + bundle)
        run: npm run build
      - name: Unit tests
        run: npm run test
      - name: Lint
        run: npm run lint
