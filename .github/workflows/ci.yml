name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (Kotlin) — build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api-kt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Build & test
        run: |
          chmod +x ./gradlew
          ./gradlew build --no-daemon

  frontend:
    name: Frontend (React) — build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build (type-check + bundle)
        run: npm run build
      - name: Unit tests
        run: npm run test
      # Lint is currently non-blocking: the codebase has pre-existing violations
      # (see tasks/todo.md). Fix those, then drop `continue-on-error` to make it a gate.
      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true
