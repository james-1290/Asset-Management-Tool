# Production static serving for the built SPA.
#
# The dev server (Vite) is not for production — it ships unminified sources, an
# open HMR websocket, and no security headers on the app document. This config
# serves the built `dist/` behind nginx with the full security-header suite and
# proxies the API on the same origin, so the app's Content-Security-Policy can
# keep `connect-src 'self'` (no CORS, no cross-origin allowance needed).
#
# The API upstream defaults to the `api` service name (docker-compose). Override
# by editing `proxy_pass` for your deployment.

upstream asset_api {
    server api:5115;
}

server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # --- Security headers on every response, including the app document ---
    # Kept in sync with the API's SecurityConfig; CSP is tuned to what the built
    # bundle loads (own JS, inline styles for React/Tailwind, Google Fonts,
    # blob:/data: images for avatars/model images/PDF preview).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets are immutable — cache hard. index.html must not be
    # cached, or clients pin a stale bundle after a deploy.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # API + SSO + SCIM live on the same origin, proxied to the backend.
    location ~ ^/(api|saml2|login/saml2|scim) {
        proxy_pass         http://asset_api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA history fallback — unknown paths return the app shell, not 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
